# ─────────────────────────────────────────────────────────
# docker-compose.yml
# Runs backend (FastAPI) and frontend (Next.js) together
# Usage: docker-compose up
# ─────────────────────────────────────────────────────────

version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: health_backend
    ports:
      - "8000:8000"
    volumes:
      # Mount data folder so ChromaDB persists between restarts
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: health_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
